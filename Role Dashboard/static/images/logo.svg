<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" opacity="0.2"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- Chart Bars -->
  <rect x="50" y="100" width="20" height="50" fill="white" rx="3">
    <animate attributeName="height" values="50;70;50" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="100;80;100" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="80" y="80" width="20" height="70" fill="white" rx="3">
    <animate attributeName="height" values="70;90;70" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="80;60;80" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="110" y="60" width="20" height="90" fill="white" rx="3">
    <animate attributeName="height" values="90;110;90" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="60;40;60" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="140" y="70" width="20" height="80" fill="white" rx="3">
    <animate attributeName="height" values="80;100;80" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="70;50;70" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Trend Line -->
  <path d="M 50 120 Q 80 100, 110 70 T 160 80" 
        stroke="white" 
        stroke-width="3" 
        fill="none" 
        opacity="0.8"
        stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0,300;300,300" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>
